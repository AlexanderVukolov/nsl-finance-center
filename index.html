  <style id="mobile-layout-v2">
/* Mobile navigation and analytics layout */
@media (max-width:620px){
  .sidebar{
    height:calc(64px + env(safe-area-inset-bottom));
    padding:4px 6px env(safe-area-inset-bottom);
    overflow:visible;
  }
  .sidebar nav{
    display:flex!important;
    flex-direction:row!important;
    align-items:stretch;
    gap:1px;
    width:100%;
    min-width:0;
  }
  .primary-nav{
    display:grid!important;
    grid-template-columns:repeat(4,minmax(0,1fr));
    flex:1 1 auto;
    min-width:0;
    gap:1px;
  }
  .primary-nav>.nav-section-title,.secondary-nav{display:none!important}
  .more-nav-button{display:flex!important;flex:0 0 20%;min-width:0}
  .sidebar nav button{
    position:relative;
    z-index:1;
    pointer-events:auto;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  .content-area{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
  .section-title .source-status{max-width:100%;white-space:normal}
  .analytics-period-panel,.analytics-history-panel{padding:10px 8px}
  .analytics-month-tabs{margin:0 -2px;padding-bottom:6px}
  .analytics-month-tabs button{flex:0 0 72px;min-width:72px}
  .analytics-card strong{font-size:20px;overflow-wrap:anywhere}
  .analytics-history-panel .section-title{align-items:stretch}
  .analytics-table-wrap{overflow:visible;touch-action:pan-y}
  .analytics-table{display:block;min-width:0!important;width:100%}
  .analytics-table thead{display:none}
  .analytics-table tbody{display:block}
  .analytics-table tr{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:9px 12px;
    margin:8px 0;
    padding:11px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fffdf9;
    box-shadow:0 2px 9px #2a342f0a;
  }
  .analytics-table td{
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
    padding:0;
    border:0;
    white-space:normal!important;
    overflow-wrap:anywhere;
    text-align:left!important;
  }
  .analytics-table td:first-child{
    grid-column:1/-1;
    padding-bottom:7px;
    border-bottom:1px solid var(--line);
    color:var(--forest);
    font-weight:800;
  }
  .analytics-table td:before{
    color:#7b8781;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-size:12px;
    line-height:1.25;
    font-weight:800;
  }
  .analytics-table td:nth-child(1):before{content:"Месяц"}
  .analytics-table td:nth-child(2):before{content:"Лиды · план / факт"}
  .analytics-table td:nth-child(3):before{content:"Квал. лиды"}
  .analytics-table td:nth-child(4):before{content:"Продажи · план / факт"}
  .analytics-table td:nth-child(5):before{content:"Выручка"}
  .analytics-table td:nth-child(6):before{content:"Деньги в кассу"}
  .analytics-table td:nth-child(7):before{content:"Рассрочка школы"}
  .analytics-table td:nth-child(8):before{content:"Предоплата"}
  .analytics-table td:nth-child(9):before{content:"Конверсия · план / факт"}
}
@media (max-width:390px){
  .school-analytics-grid,.expense-share-grid,.workflow-grid,.file-grid{grid-template-columns:1fr}
  .analytics-table tr{grid-template-columns:1fr}
  .analytics-table td:first-child{grid-column:1}
}
  </style>
  <style id="mobile-pnl-v3">
/* iPhone P&L layout: one scroll container and readable editing cards */
@media (max-width:620px){
  html,body{
    width:100%;
    height:100%!important;
    overflow:hidden!important;
    position:static!important;
  }
  #root{
    width:100%;
    height:100dvh!important;
    min-height:0!important;
    overflow-x:hidden!important;
    overflow-y:auto!important;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:auto;
    touch-action:pan-y;
  }
  .app-shell,.main-content,.content-area,.panel,.expense-register,
  .pnl-detail-wrap,.payroll-wrap{
    max-width:100%;
    min-width:0;
    height:auto!important;
    overflow:visible!important;
    touch-action:auto!important;
  }
  .content-area{padding-bottom:calc(150px + env(safe-area-inset-bottom))}
  .pnl-detail-panel{padding-left:6px;padding-right:6px;overflow:visible}
  .expense-register{width:100%;box-sizing:border-box}
  .expense-register>summary{
    grid-template-columns:34px minmax(0,1fr);
    grid-template-rows:auto auto;
    align-items:start;
    gap:7px 8px;
    width:100%;
    min-width:0;
    padding:11px 10px;
    box-sizing:border-box;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  .expense-register>summary:before{
    grid-area:1/1;
    align-self:center;
  }
  .expense-register>summary>span:first-child{
    grid-area:1/2;
    min-width:0;
    margin-left:0;
  }
  .expense-register>summary b,
  .expense-register>summary small{
    overflow-wrap:anywhere;
    line-height:1.35;
  }
  .register-total{
    grid-area:2/2;
    align-items:flex-start;
    width:100%;
    min-width:0;
  }
  .register-total strong{align-self:flex-end;white-space:normal}
  .register-total small{width:100%;white-space:normal;overflow-wrap:anywhere}
  .expense-register .pnl-detail-wrap{width:100%;overflow:visible!important}
  .pnl-detail-table,.pnl-detail-table tbody{width:100%;max-width:100%}
  .pnl-line{
    grid-template-columns:repeat(2,minmax(0,1fr));
    width:auto;
    min-width:0;
    margin:8px 6px;
    padding:10px;
    gap:10px;
    box-sizing:border-box;
  }
  .pnl-line td:first-child,
  .pnl-line td:nth-child(6),
  .pnl-line .mobile-delete-cell{grid-column:1/-1}
  .pnl-line td{min-width:0!important;overflow:visible}
  .pnl-line td:before{
    min-height:0;
    font-size:12px;
    line-height:1.25;
    letter-spacing:.06em;
    overflow-wrap:anywhere;
  }
  .pnl-line input{
    width:100%!important;
    max-width:100%;
    min-width:0!important;
    box-sizing:border-box;
  }
  .pnl-value-input{
    width:100%;
    max-width:100%;
    min-width:0!important;
  }
  .pnl-value-input input{flex:1 1 auto;min-width:0!important}
  .auto-calculated{
    width:100%;
